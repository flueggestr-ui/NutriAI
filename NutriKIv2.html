<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NutriKI</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,500&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f0e8;--sf:#fff;--card:#faf7f1;
  --br:#e2d5c3;--br2:#c9b99f;
  --ink:#1a1005;--mu:#8a7a62;--fa:#c4b49a;
  --gr:#276749;--gl:#d5f0dd;--gd:#1e5038;
  --or:#b85418;--ol:#fde4d0;
  --bl:#1a4d7a;--bll:#d3e8f8;
  --go:#a07808;--gol:#fef7dc;
  --pu:#6b2d8b;--pul:#f0e6f8;
  --r:13px;--sh:0 2px 14px #1a100510;--shl:0 6px 30px #1a100518;
}
body{background:var(--bg);color:var(--ink);font-family:'Syne',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.nav{background:var(--sf);border-top:1px solid var(--br);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;z-index:200;box-shadow:0 -2px 20px #1a100512}
.nb{flex:1;padding:8px 2px 13px;background:none;border:none;color:var(--mu);cursor:pointer;font-family:'Syne',sans-serif;font-size:8.5px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px;letter-spacing:.04em;text-transform:uppercase;transition:color .2s;-webkit-tap-highlight-color:transparent}
.nb .ni{font-size:20px;line-height:1;transition:transform .2s}
.nb.on{color:var(--gr)}.nb.on .ni{transform:scale(1.12)}
.page{flex:1;padding:18px 15px 96px;animation:fu .22s ease}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.ptitle{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;line-height:1.1;margin-bottom:3px}
.ptitle em{font-style:italic;color:var(--gr)}
.psub{color:var(--mu);font-size:12px;margin-bottom:16px;font-weight:500}
.slbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:7px}
.card{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--sh)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 15px;border-radius:9px;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.03em;transition:all .15s;-webkit-tap-highlight-color:transparent}
.bg{background:var(--gr);color:#fff}.bg:hover{background:var(--gd)}.bg:active{transform:scale(.97)}
.bo{background:transparent;border:1.5px solid var(--br2);color:var(--ink)}.bo:hover{border-color:var(--gr);color:var(--gr)}
.bpu{background:var(--pu);color:#fff}
.bgh{background:transparent;color:var(--mu)}.bgh:hover{color:var(--ink)}
.bd{background:transparent;border:1px solid #e8b4a0;color:var(--or)}.bd:hover{background:var(--ol)}
.bsm{padding:5px 10px;font-size:11px}
.bic{width:30px;height:30px;padding:0;justify-content:center;border-radius:8px;font-size:14px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.field{margin-bottom:11px}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;background:var(--bg);border:1.5px solid var(--br);border-radius:8px;padding:9px 12px;color:var(--ink);font-family:'Syne',sans-serif;font-size:13px;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gr);background:var(--sf)}
.field textarea{resize:vertical;min-height:60px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

.chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.chip{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600}
.ck{background:var(--gol);color:var(--go)}.cp{background:var(--bll);color:var(--bl)}
.cf{background:var(--ol);color:var(--or)}.cc{background:var(--gl);color:var(--gr)}
.cfi{background:var(--pul);color:var(--pu)}
.aichat{background:var(--bg);border:1.5px solid var(--br);border-radius:var(--r);padding:12px;margin-bottom:10px;max-height:200px;overflow-y:auto;scroll-behavior:smooth}
.msg{margin-bottom:6px;display:flex}.msg.u{justify-content:flex-end}
.bubble{padding:8px 12px;font-size:13px;line-height:1.5;max-width:86%;border-radius:12px}
.msg.a .bubble{background:var(--gl);color:var(--ink);border-radius:3px 12px 12px 12px}

.airow{display:flex;gap:7px;margin-bottom:11px}
.airow input{flex:1;background:var(--sf);border:1.5px solid var(--br);border-radius:8px;padding:8px 11px;font-family:'Syne',sans-serif;font-size:13px;outline:none}
.airow input:focus{border-color:var(--gr)}
.dots{display:flex;gap:4px;padding:5px 2px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;background:var(--gr);animation:pu 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}

.sug{background:var(--card);border:1.5px solid var(--br);border-radius:var(--r);padding:12px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.sug:hover,.sug:active{border-color:var(--gr)}.sug.sel{border-color:var(--gr);background:var(--gl)}
.sugname{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;margin-bottom:3px}
.cat-tabs{display:flex;gap:0;background:var(--bg);border:1.5px solid var(--br);border-radius:10px;padding:3px;margin-bottom:14px}

.sitem{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--sf);border:1px solid var(--br);border-radius:var(--r);margin-bottom:7px;box-shadow:var(--sh)}

.scb{width:24px;height:24px;border-radius:7px;border:2px solid var(--br2);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all .2s}

.sqty{font-size:12px;color:var(--mu);font-weight:600;white-space:nowrap;margin-left:8px}
.ssrc{font-size:10px;color:var(--fa);margin-top:1px}
.live-badge{display:inline-flex;align-items:center;gap:5px;background:var(--gl);color:var(--gr);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--gr);animation:pu 1.5s infinite}
.live-badge.off{background:#fee;color:var(--or)}.live-badge.off .live-dot{background:var(--or)}
.plan-day-card{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);margin-bottom:10px;box-shadow:var(--sh);overflow:hidden}
.plan-day-hdr{padding:10px 14px;background:var(--card);border-bottom:1px solid var(--br);display:flex;align-items:center}
.plan-slot{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bg);cursor:pointer;transition:background .15s}
.plan-slot:last-child{border-bottom:none}
.plan-slot:hover{background:var(--bg)}.plan-slot:active{background:var(--gl)}
.plab{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--mu);min-width:58px}
.pdname{flex:1;font-size:12.5px;font-weight:500}
.pkcal{font-size:11px;color:var(--go);font-weight:700}
.pbar-row{margin-bottom:8px}
.pbar-top{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.pbar-label{font-weight:700;color:var(--mu)}
.pbar-track{height:8px;background:var(--bg);border-radius:10px;overflow:hidden;border:1px solid var(--br)}
.pbar-fill{height:100%;border-radius:10px;transition:width .5s ease}
.pbar-fill.over{background:var(--or)!important}

.user-sw-btn.on{background:var(--gr);color:#fff;box-shadow:0 2px 8px #27674933}
.drow{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--bg)}
.wbig{font-family:'Playfair Display',serif;font-size:50px;font-weight:900;line-height:1}
.wchart{display:flex;align-items:flex-end;gap:3px;height:70px;margin-top:10px}
.wb{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:0}
.wbar{border-radius:3px 3px 0 0;min-height:3px;width:100%}
.wlbl{font-size:8px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.ov{position:fixed;inset:0;background:#1a100552;backdrop-filter:blur(4px);z-index:300;display:flex;align-items:flex-end}
.modal{background:var(--sf);border-radius:22px 22px 0 0;border-top:2.5px solid var(--gr);padding:20px 16px 36px;width:100%;max-height:94vh;overflow-y:auto;animation:su .26s ease}
@keyframes su{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.mtitle{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;margin-bottom:12px}
.mact{display:flex;gap:9px;margin-top:14px}
.iedit{display:flex;gap:5px;margin-bottom:7px;align-items:center}
.iedit input{flex:1}.iqty{width:90px;flex-shrink:0}
/* AUTH */
.auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;background:var(--bg)}
.auth-logo{font-family:'Playfair Display',serif;font-size:44px;font-weight:900;margin-bottom:4px;text-align:center}
.auth-logo em{font-style:italic;color:var(--gr)}
.auth-tabs{display:flex;background:var(--bg);border:1.5px solid var(--br);border-radius:10px;padding:3px;margin-bottom:18px}
.auth-tab{flex:1;padding:8px;border:none;border-radius:7px;cursor:pointer;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;background:transparent;color:var(--mu);transition:all .2s}
.auth-tab.on{background:var(--gr);color:#fff}
/* FAMILY BANNER */
.fam-banner{background:var(--gl);border:1px solid #a8d8b8;border-radius:var(--r);padding:10px 13px;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--gr)}
/* COOKING MULTIPLIER */
.cook-multi{background:var(--gol);border:1px solid #d4b840;border-radius:10px;padding:9px 13px;display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cook-multi-btn{width:26px;height:26px;border-radius:6px;border:1.5px solid var(--br2);background:var(--sf);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--gr)}
.photo-area{border:2px dashed var(--br2);border-radius:var(--r);padding:18px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg)}
.photo-area:hover{border-color:var(--gr);background:var(--gl)}
.photo-preview{width:100%;max-height:180px;object-fit:cover;border-radius:var(--r);margin-bottom:10px}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--gr);color:#fff;padding:9px 20px;border-radius:30px;font-size:13px;font-weight:700;z-index:400;white-space:nowrap;box-shadow:0 4px 20px #27674944;animation:ti .3s ease}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.badge{display:inline-block;background:var(--or);color:#fff;border-radius:10px;font-size:9px;padding:1px 6px;margin-left:3px;vertical-align:middle}
.div{height:1px;background:var(--br);margin:12px 0}
.empty{text-align:center;color:var(--mu);padding:36px 20px;font-size:13px;line-height:1.7}
code{background:var(--bg);border:1px solid var(--br);border-radius:5px;padding:2px 7px;font-size:11px;font-family:monospace;color:var(--gr)}
a{color:var(--gr)}
select option{background:#fff}
.setup-card{background:var(--sf);border:1px solid var(--br);border-radius:14px;padding:18px;margin-bottom:12px}
.step-box{background:var(--card);border:1px solid var(--br);border-radius:9px;padding:10px 13px;margin-bottom:7px;display:flex;align-items:flex-start;gap:8px}
.step-num{display:inline-flex;width:22px;height:22px;border-radius:50%;background:var(--gr);color:#fff;font-size:11px;font-weight:700;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
/* LIBRARY */
.lib-card{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:13px;margin-bottom:9px;box-shadow:var(--sh)}
.fav-btn{background:none;border:none;cursor:pointer;font-size:20px;padding:4px;border-radius:8px;transition:transform .15s;-webkit-tap-highlight-color:transparent}
.fav-btn:hover{transform:scale(1.2)}
.pub-badge{display:inline-flex;align-items:center;gap:4px;background:var(--gol);color:var(--go);border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700}
.migrate-banner{background:var(--bll);border:1.5px solid #a8cfe8;border-radius:var(--r);padding:14px;margin-bottom:14px}
</style>

<body>
<div id="root"></div>
<script>
'use strict';
// ═══════════════════════════════════════════════
// STORAGE & FIREBASE
// ═══════════════════════════════════════════════
const LS={
  get:(k)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};

let FB=""; // Firebase base URL
const fbUrl=p=>`${FB}/${p}.json`;
async function fbGet(p){try{const r=await fetch(fbUrl(p));if(!r.ok)return null;const d=await r.json();return d}catch{return null}}
async function fbSet(p,d){try{await fetch(fbUrl(p),{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)})}catch{}}
async function fbPatch(p,d){try{await fetch(fbUrl(p),{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)})}catch{}}
async function fbDel(p){try{await fetch(fbUrl(p),{method:"DELETE"})}catch{}}

// ═══════════════════════════════════════════════
// AUTH (simple, stored in Firebase)
// ═══════════════════════════════════════════════
// Data structure:
// /users/{username} = {passwordHash, group, goals, displayName}
// /groups/{group}/dishes/{id} = dish
// /groups/{group}/shopping/{id} = item
// /groups/{group}/plan/{username}/{day}/{meal} = meal  (personal plan per user)
// /users/{username}/diary/{date} = entries[]
// /users/{username}/weight = []

function hashPw(pw){
  // Simple hash - not cryptographic but enough for family app
  let h=0;for(let i=0;i<pw.length;i++){h=((h<<5)-h)+pw.charCodeAt(i);h|=0;}return h.toString(36);
}

let SESSION=LS.get("nk_session")||null; // {username, group, displayName}
if(SESSION&&SESSION.group)SESSION.group=SESSION.group.trim().toLowerCase().replace(/[^a-z0-9_-]/g,"");

async function doLogin(username,password){
  const uname=username.trim().toLowerCase().replace(/[^a-z0-9_]/g,"");
  if(!uname||!password)return"Bitte alle Felder ausfüllen";
  const stored=await fbGet("users/"+uname);
  if(!stored)return"Benutzer nicht gefunden";
  if(stored.passwordHash!==hashPw(password))return"Falsches Passwort";
  const cleanGroup=(stored.group||"").trim().toLowerCase().replace(/[^a-z0-9_-]/g,"");
  SESSION={username:uname,group:cleanGroup,displayName:stored.displayName||uname};
  LS.set("nk_session",SESSION);
  return null;
}

async function doRegister(username,displayName,password,password2,group){
  const uname=username.trim().toLowerCase().replace(/[^a-z0-9_]/g,"");
  if(!uname||!displayName||!password||!group)return"Bitte alle Felder ausfüllen";
  if(password!==password2)return"Passwörter stimmen nicht überein";
  if(password.length<4)return"Passwort mindestens 4 Zeichen";
  if(!uname.match(/^[a-z0-9_]{2,20}$/))return"Benutzername: 2-20 Zeichen, nur Buchstaben/Zahlen/_";
  const existing=await fbGet("users/"+uname);
  if(existing)return"Benutzername bereits vergeben";
  const userData={passwordHash:hashPw(password),group:group.trim().toLowerCase().replace(/[^a-z0-9_-]/g,""),displayName:displayName.trim(),goals:DEF_GOALS_PERSONAL};
  await fbSet("users/"+uname,userData);
  SESSION={username:uname,group:userData.group,displayName:userData.displayName};
  LS.set("nk_session",SESSION);
  return null;
}

function doLogout(){SESSION=null;LS.set("nk_session",null);S.tab="ai";loadAllData().then(()=>render());}

// ═══════════════════════════════════════════════
// FIREBASE PATHS (group & user scoped)
// ═══════════════════════════════════════════════
const grpPath=p=>SESSION?`groups/${SESSION.group}/${p}`:p;
const usrPath=p=>SESSION?`users/${SESSION.username}/${p}`:p;
const planPath=(day,meal)=>grpPath(`plan/${SESSION.username}/${day}/${meal}`);

// ═══════════════════════════════════════════════
// CLAUDE API
// ═══════════════════════════════════════════════
async function claude(system,user,imgB64=null){
  const cfg=LS.get("nk_cfg")||{};
  if(!cfg.apiKey)throw new Error("Kein API-Key");
  const content=[];
  if(imgB64)content.push({type:"image",source:{type:"base64",media_type:"image/jpeg",data:imgB64}});
  content.push({type:"text",text:user});
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":cfg.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-opus-4-5",max_tokens:3000,system,messages:[{role:"user",content}]})
  });
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||"API Fehler "+r.status)}
  const d=await r.json();
  const txt=d.content?.map(b=>b.text||"").join("")||"";
  try{return JSON.parse(txt.split("```json").join("").split("```").join("").trim())}catch{return null}
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
const uid=()=>Math.random().toString(36).slice(2,9);
const today=()=>new Date().toISOString().slice(0,10);
const fmtD=d=>{try{return new Date(d+"T12:00:00").toLocaleDateString("de-DE",{weekday:"short",day:"2-digit",month:"short"})}catch{return d}};
const fmtShort=d=>{try{return new Date(d+"T12:00:00").toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"})}catch{return d}};
const DAYS=["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];
const MEALS=["Frühstück","Mittagessen","Abendessen","Snack"];
const CATS=["Alle","Frühstück","Mittag & Abend","Snacks"];
const CAT_MAP={"Frühstück":"Frühstück","Mittagessen":"Mittag & Abend","Abendessen":"Mittag & Abend","Snack":"Snacks"};
function dishCat(d){return CAT_MAP[d.category]||"Mittag & Abend"}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function parseQty(str){const m=String(str||"").match(/[\d]+(?:[.,][\d]+)?/);return m?parseFloat(m[0].replace(",",".")):0}
function parseUnit(str){const m=String(str||"").match(/[\d.,½¼¾⅓⅔⅛⅜⅝⅞\/\s]+([a-zA-ZäöüÄÖÜßg]+)/);return m?m[1].trim():""}

function fmtNum(n){
  // Format a scaled number nicely: no trailing zeros, max 1 decimal
  if(Number.isInteger(n))return String(n);
  const r=Math.round(n*10)/10;
  return Number.isInteger(r)?String(r):r.toFixed(1);
}

// Unicode fractions → decimal
const UNICODE_FRACS={"½":0.5,"¼":0.25,"¾":0.75,"⅓":0.333,"⅔":0.667,"⅛":0.125,"⅜":0.375,"⅝":0.625,"⅞":0.875};

function parseNumStr(s){
  s=s.trim();
  // Pure unicode fraction: ½ ¼ ¾ etc.
  if(UNICODE_FRACS[s]!==undefined)return UNICODE_FRACS[s];
  // Integer + unicode fraction: 1½  2¾
  for(const[uf,fv]of Object.entries(UNICODE_FRACS)){
    if(s.endsWith(uf)){
      const ip=s.slice(0,-[...uf].length).trim();
      if(ip===""||ip==="0")return fv;
      const n=parseFloat(ip);
      if(!isNaN(n))return n+fv;
    }
  }
  // ASCII fraction 1/2
  const af=s.match(/^(\d+)\/(\d+)$/);
  if(af)return parseInt(af[1])/parseInt(af[2]);
  // Normal number
  const n=parseFloat(s.replace(",","."));
  return isNaN(n)?null:n;
}

function scaleQty(qtyStr,factor){
  if(!qtyStr&&qtyStr!==0)return "";
  const str=String(qtyStr).trim();
  if(!str)return "";
  if(!factor||factor===1)return str;

  // Try to split into numeric-prefix and unit
  // Matches: "200 g", "2 TL", "½ Stück", "¼ Zehe", "1½ TL", "1/2 TL", "2", "1.5"
  const m1=str.match(/^(\d[\d.,]*(?:\/\d+)?[½¼¾⅓⅔⅛⅜⅝⅞]?|[½¼¾⅓⅔⅛⅜⅝⅞](?:\d[\d.,]*)?)\s*(.*)/u);
  if(m1){
    const num=parseNumStr(m1[1]);
    if(num===null||num===0)return str;
    const unit=m1[2].trim();
    const scaled=num*factor;
    return unit?`${fmtNum(scaled)} ${unit}`:fmtNum(scaled);
  }

  // Number at END: "Paprika 2", "Eier ½"
  const m2=str.match(/^(.*?)\s+(\d[\d.,]*(?:\/\d+)?[½¼¾⅓⅔⅛⅜⅝⅞]?|[½¼¾⅓⅔⅛⅜⅝⅞])$/u);
  if(m2){
    const num=parseNumStr(m2[2]);
    if(num===null||num===0)return str;
    return`${m2[1].trim()} ${fmtNum(num*factor)}`;
  }

  return str;
}

// Scale an ingredient - handles qty field AND name field (if qty is empty)
function scaleIngredient(ig, factor){
  if(ig.qty&&String(ig.qty).trim()){
    return{name:ig.name, qty:scaleQty(ig.qty, factor)};
  }
  // qty is empty: try to find and scale number inside the name
  const name=String(ig.name||"").trim();
  const m=name.match(/^([\d]+(?:[.,][\d]+)?)\s*(.*)/);
  if(m){
    const num=parseFloat(m[1].replace(",","."));
    if(num){return{name:m[2].trim(), qty:fmtNum(num*factor)};}
  }
  const m2=name.match(/^(.*?)\s+([\d]+(?:[.,][\d]+)?)\s*(.*)$/);
  if(m2){
    const num=parseFloat(m2[2].replace(",","."));
    if(num){return{name:(m2[1]+" "+(m2[3]||"")).trim(), qty:fmtNum(num*factor)};}
  }
  return{name:ig.name, qty:""};
}
function consolidateShop(items){
  const map={};
  items.forEach(item=>{
    const key=item.name.toLowerCase().trim();
    if(!map[key])map[key]={...item,_qty:parseQty(item.qty),_unit:parseUnit(item.qty),_ids:[item.id]};
    else{map[key]._qty+=parseQty(item.qty);map[key]._ids.push(item.id);if(item.source&&!map[key].source.includes(item.source))map[key].source+=" · "+item.source;}
  });
  return Object.values(map).map(it=>({...it,qty:it._unit?`${Math.round(it._qty*10)/10} ${it._unit}`:it.qty}));
}

let sseShop=null,sseDishes=null;

function startSSE(){
  // Shopping SSE
  if(sseShop){sseShop.close();sseShop=null}
  if(!FB||!SESSION)return;
  try{
    sseShop=new EventSource(fbUrl(grpPath("shopping"))+"?accept=text/event-stream");
    sseShop.addEventListener("put",e=>{
      try{
        const d=JSON.parse(e.data);
        if(d.path==="/"&&d.data)S.shopping=Object.entries(d.data).map(([id,it])=>({...it,id}));
        else if(d.path!=="/"&&d.data!==null){const id=d.path.replace("/","");const idx=S.shopping.findIndex(x=>x.id===id);if(idx>=0)S.shopping[idx]={...d.data,id};else S.shopping.push({...d.data,id});}
        else if(d.path!=="/"&&d.data===null)S.shopping=S.shopping.filter(x=>x.id!==d.path.replace("/",""));
        else if(d.path==="/"&&d.data===null)S.shopping=[];
        S.live=true;if(S.tab==="shopping")render();
      }catch{}
    });
    sseShop.onerror=()=>{S.live=false};
    sseShop.onopen=()=>{S.live=true};
  }catch{S.live=false}
  // Dishes SSE
  if(sseDishes){sseDishes.close();sseDishes=null}
  try{
    sseDishes=new EventSource(fbUrl(grpPath("dishes"))+"?accept=text/event-stream");
    sseDishes.addEventListener("put",e=>{
      try{
        const d=JSON.parse(e.data);
        if(d.path==="/"&&d.data)S.dishes=Object.entries(d.data).map(([id,it])=>({...it,id}));
        else if(d.path!=="/"&&d.data!==null){const id=d.path.replace("/","");const idx=S.dishes.findIndex(x=>x.id===id);if(idx>=0)S.dishes[idx]={...d.data,id};else S.dishes.push({...d.data,id});}
        else if(d.path!=="/"&&d.data===null)S.dishes=S.dishes.filter(x=>x.id!==d.path.replace("/",""));
        else if(d.path==="/"&&d.data===null)S.dishes=[];
        if(S.tab==="gerichte"||S.tab==="ai")render();
      }catch{}
    });
  }catch{}
}

async function loadAllData(){
  if(!SESSION||!FB)return;
  // Shopping
  const sh=await fbGet(grpPath("shopping"));
  S.shopping=sh&&typeof sh==="object"?Object.entries(sh).map(([id,it])=>({...it,id})):[];
  // Dishes
  const di=await fbGet(grpPath("dishes"));
  S.dishes=di&&typeof di==="object"?Object.entries(di).map(([id,it])=>({...it,id})):[];
  // Plan (personal)
  const pl=await fbGet(grpPath(`plan/${SESSION.username}`));
  S.plan=pl&&typeof pl==="object"?pl:{};
  // Goals (personal)
  const userData=await fbGet(`users/${SESSION.username}`);
  S.goals=userData?.goals||{...DEF_GOALS_PERSONAL};
  // Group members
  const allUsers=await fbGet("users");
  S.groupMembers=allUsers?Object.entries(allUsers).filter(([u,d])=>d.group===SESSION.group&&u!==SESSION.username).map(([u,d])=>d.displayName||u):[];
  // Public library + favorites
  await loadPublicDishes();
}

// Public library
async function publishDish(dish){
  const{id,...data}=dish;
  // strip internal fields before publishing
  const{_avgRating,_ratingCount,_myRating,_commentCount,_ids,...clean}=data;
  await fbSet(`public_dishes/${id}`,{...clean,publishedBy:SESSION.group,publishedByDisplay:SESSION.displayName});
}
async function loadPublicDishes(){
  try{
    const [d,allRatings,allCommentMeta,favData]=await Promise.all([
      fbGet("public_dishes"),
      fbGet("dish_ratings"),
      fbGet("dish_comment_counts"),
      SESSION?fbGet(grpPath("favorites")):Promise.resolve(null)
    ]);
    S.publicDishes=d&&typeof d==="object"?Object.entries(d).map(([id,it])=>{
      const ratings=allRatings?.[id]||{};
      const rvals=Object.values(ratings);
      const avgR=rvals.length?Math.round(rvals.reduce((s,v)=>s+v,0)/rvals.length*10)/10:0;
      const myR=SESSION?ratings[SESSION.username]||0:0;
      const commentCount=allCommentMeta?.[id]||0;
      return{...it,id,_avgRating:avgR,_ratingCount:rvals.length,_myRating:myR,_commentCount:commentCount};
    }):[];
    S.groupFavIds=new Set(favData?Object.keys(favData):[]);
  }catch(e){console.error("loadPublicDishes error:",e);}
}

async function loadDishComments(id){
  const c=await fbGet(`dish_comments/${id}`);
  S.libDishComments[id]=c&&typeof c==="object"?Object.entries(c).map(([cid,it])=>({...it,cid})).sort((a,b)=>a.ts-b.ts):[];

async function addPublicComment(id){
  const text=S.libCommentText.trim();if(!text||!SESSION)return;
  const cid=uid();
  const comment={text,author:SESSION.username,authorDisplay:SESSION.displayName||SESSION.username,ts:Date.now()};
  await fbSet(`dish_comments/${id}/${cid}`,comment);
  // update comment count
  const cur=await fbGet(`dish_comment_counts/${id}`)||0;
  await fbSet(`dish_comment_counts/${id}`,cur+1);
  S.libCommentText="";
  await loadDishComments(id);
  await loadPublicDishes();render();
}
async function toggleFavorite(publicDishId){
  if(S.groupFavIds.has(publicDishId)){
    await fbDel(grpPath("favorites/"+publicDishId));
    S.groupFavIds.delete(publicDishId);
    toast("Favorit entfernt");
  } else {
    await fbSet(grpPath("favorites/"+publicDishId),{addedAt:Date.now(),addedBy:SESSION.username});
    S.groupFavIds.add(publicDishId);
    toast("⭐ Als Favorit gespeichert");
  }
  render();
}
async function addFavToGroupDishes(pubDish){
  const newDish={...pubDish,id:uid()};
  delete newDish.publishedBy;delete newDish.publishedByDisplay;
  S.dishes.push(newDish);
  await dishSave(newDish);
  toast(`✓ "${newDish.name}" zu euren Gerichten hinzugefügt`);
  render();
}

async function resyncLibrary(){
  if(!S.dishes.length){toast("Keine Gerichte zum Synchronisieren");return;}
  toast("⏳ Synchronisiere…");
  for(const d of S.dishes)await publishDish(d);
  await loadPublicDishes();
  toast(`✓ ${S.dishes.length} Gerichte synchronisiert`);render();
}

// Migration from old localStorage
async function migrateOldDishes(){
  const oldKeys=["nk4_dishes","nk3_dishes","nk_dishes"];
  let imported=[];
  for(const k of oldKeys){
    const data=LS.get(k);
    if(data&&Array.isArray(data)&&data.length){imported=data;break;}
  }
  if(!imported.length){toast("Keine alten Gerichte gefunden");return;}
  S.migrating=true;S.migrateCount=0;render();
  for(const dish of imported){
    const newDish={...dish,id:dish.id||uid()};
    S.dishes.push(newDish);
    await dishSave(newDish);
    // also publish to public library
    await publishDish(newDish);
    S.migrateCount++;
  }
  S.migrating=false;
  toast(`✓ ${imported.length} Gerichte übertragen!`);
  render();
}

async function doLoginUI(){
  // Read values BEFORE render() replaces the DOM
  const user=document.getElementById("a_user")?.value||"";
  const pw=document.getElementById("a_pw")?.value||"";
  S.authLoading=true;S.authError="";render();
  const err=await doLogin(user,pw);
  S.authLoading=false;
  if(err){S.authError=err;render();return;}
  try{await loadAllData();startSSE();}catch(e){console.error(e);}
  render();
}
async function doRegisterUI(){
  // Read values BEFORE render() replaces the DOM
  const user=document.getElementById("r_user")?.value||"";
  const display=document.getElementById("r_display")?.value||"";
  const pw=document.getElementById("r_pw")?.value||"";
  const pw2=document.getElementById("r_pw2")?.value||"";
  const group=document.getElementById("r_group")?.value||"";
  S.authLoading=true;S.authError="";render();
  const err=await doRegister(user,display,pw,pw2,group);
  S.authLoading=false;
  if(err){S.authError=err;render();return;}
  try{await loadAllData();startSSE();}catch(e){console.error(e);}
  render();
}

function addIng(){if(!S.editDish.ingredients)S.editDish.ingredients=[];S.editDish.ingredients.push({name:"",qty:""});render()}
function rmIng(i){S.editDish.ingredients.splice(i,1);render()}
function scrollChat(id){setTimeout(()=>{const c=document.getElementById(id);if(c)c.scrollTop=c.scrollHeight},60)}

async function sendAI(){
  const el=document.getElementById("aiIn");if(!el)return;
  const txt=el.value.trim();if(!txt||S.aiLoading)return;
  S.msgs.push({r:"u",t:esc(txt)});S.aiLoading=true;render();scrollChat("aichat");
  try{
    const sys=`Du bist Ernährungsexperte. Antworte NUR als JSON-Array mit 3 Gerichten.
Format: [{"name":"...","category":"Frühstück|Mittagessen|Abendessen|Snack","description":"2 Sätze","prepTime":"15 Min","cookTime":"30 Min","kcal":520,"protein":38,"fat":14,"carbs":52,"fiber":8,"portionWeight":550,"servings":4,"ingredients":[{"name":"Hähnchenbrust","qty":"1000 g"}],"steps":"Schritt 1: ...\nSchritt 2: ..."}]
Nährwerte pro Portion, realistisch. fiber immer angeben. NUR JSON.`;
    const data=await claude(sys,txt);
    if(data&&Array.isArray(data)&&data.length){
      S.sugs=data;S.selSug=null;S.editDish=null;S.aiStep="suggestions";
      S.msgs.push({r:"a",t:`<strong>${data.length} Vorschläge</strong> gefunden! Tippe auf einen zum Auswählen.`});
    }else S.msgs.push({r:"a",t:"Keine Vorschläge. Versuche eine andere Beschreibung."});
  }catch(e){S.msgs.push({r:"a",t:"⚠️ "+esc(e.message)})}
  S.aiLoading=false;render();scrollChat("aichat");
}
function pickSug(i){S.selSug=i;S.editDish={...S.sugs[i],ingredients:(S.sugs[i].ingredients||[]).map(x=>({...x}))};render()}
async function refineAI(){
  const el=document.getElementById("refIn");if(!el||S.refLoading||S.selSug===null)return;
  const ins=el.value.trim();if(!ins)return;S.refLoading=true;render();
  try{
    const data=await claude("Modifiziere das Gericht. NUR JSON-Objekt mit denselben Feldern inkl. fiber, steps.",`Gericht: ${JSON.stringify(S.sugs[S.selSug])}\n\nAnweisung: ${ins}`);
    if(data&&data.name){S.sugs[S.selSug]=data;S.editDish={...data,ingredients:(data.ingredients||[]).map(x=>({...x}))}}
  }catch{}
  S.refLoading=false;render();
}
function saveFromAI(){
  if(!S.editDish)return;
  const d={...S.editDish,id:uid()};
  ["kcal","protein","fat","carbs","fiber"].forEach(k=>d[k]=parseFloat(d[k])||0);
  // Normalize ingredients to 1 portion (divide by servings if recipe is for multiple)
  const srv=parseFloat(d.servings)||1;
  if(srv>1&&d.ingredients){
    d.ingredients=d.ingredients.map(ig=>({
      ...ig,
      qty:scaleQty(ig.qty,1/srv)
    }));
    d.servings=1;
  }
  S.dishes.push(d);dishSave(d);publishDish(d);toast(`✓ "${d.name}" gespeichert & in Bibliothek`);resetAI();
}
async function aiToShop(){
  if(!S.editDish)return;
  const multi=S.cookMulti||1;
  for(const ig of(S.editDish.ingredients||[])){
    if(ig.name){const item={id:uid(),name:ig.name,qty:scaleQty(ig.qty,multi),done:false,source:S.editDish.name};S.shopping.push(item);await shopAdd(item);}
  }
  toast("✓ Zutaten zur Einkaufsliste");
}
function resetAI(){S.aiStep="chat";S.sugs=[];S.selSug=null;S.editDish=null;render()}
function deleteDish(id){if(!confirm("Gericht löschen?"))return;S.dishes=S.dishes.filter(d=>d.id!==id);dishDelete(id);toast("Gelöscht");render()}

async function generatePlan(prefs){
  S.modal=null;S.planLoading=true;render();
  try{
    const sys=`Du bist Ernährungsexperte. Erstelle einen vollständigen 7-Tage-Ernährungsplan. NUR JSON:
{"Montag":{"Frühstück":{"name":"...","kcal":400,"protein":20,"fat":10,"carbs":55,"fiber":8,"portions":1,"ingredients":[{"name":"...","qty":"..."}]},...},...alle 7 Tage}`;
    const saved=S.dishes.length?`Nutze bevorzugt: ${S.dishes.map(d=>d.name).join(", ")}.`:"";
    const data=await claude(sys,`Plan für: ${prefs}. ${saved}`);
    if(data&&data["Montag"]){S.plan=data;planSave();toast("✓ Wochenplan erstellt!")}
    else toast("⚠️ Fehler, bitte erneut versuchen");

function chgPlanPortions(day,meal,delta){
  const m=S.plan[day]?.[meal]; if(!m)return;
  const oldP=m.portions||1;
  const newP=Math.max(0.25,Math.round((oldP+delta)*4)/4);
  // Store base macros (1-portion) on first change
  if(!m.baseKcal){m.baseKcal=m.kcal/oldP;m.baseProtein=(m.protein||0)/oldP;m.baseFat=(m.fat||0)/oldP;m.baseCarbs=(m.carbs||0)/oldP;m.baseFiber=(m.fiber||0)/oldP;}
  m.portions=newP;
  // Update display macros (personal plan stays accurate)
  m.kcal=Math.round(m.baseKcal*newP);
  m.protein=Math.round(m.baseProtein*newP*10)/10;
  m.fat=Math.round(m.baseFat*newP*10)/10;
  m.carbs=Math.round(m.baseCarbs*newP*10)/10;
  m.fiber=Math.round(m.baseFiber*newP*10)/10;
  planSave();render();
}

function planToShop(all){
  // Collect which meals to shop
  const hasSelection=Object.values(S.planSelected).some(v=>v===true);
  const toShop=[];
  for(const [day,dayMeals] of Object.entries(S.plan)){
    for(const [mealName,meal] of Object.entries(dayMeals)){
      const key=day+"_"+mealName;
      if(!all&&hasSelection&&!S.planSelected[key])continue;
      toShop.push({day,meal:mealName,data:meal,key});
    }
  }
  if(toShop.length===0){toast("Keine Mahlzeiten ausgewählt – Häkchen setzen!");return;}
  // Open buy-portions modal
  S.planShopQueue=toShop;
  S.planBuyPortions={}; // {key: portions}
  toShop.forEach(m=>{S.planBuyPortions[m.key]=S.cookMulti||1;});
  S.modal="planshop";render();
}

async function confirmPlanToShop(){
  let n=0;
  for(const {day,meal,data,key} of (S.planShopQueue||[])){
    const buyPortions=S.planBuyPortions[key]||1;
    for(const ig of(data.ingredients||[])){
      if(ig.name){

          source:`${data.name} (${day}, ${buyPortions}×)`};

      }
    }

  closeModal();
  toast(`✓ ${n} Artikel zur Einkaufsliste`);setTab("shopping");
}

function renderShopItem(item){
  const ids=item._ids&&item._ids.length>1?item._ids:[item.id];
  const idsJson=JSON.stringify(ids);
  const toggleFn=ids.length>1?`doToggleAll(${idsJson})`:`doToggle('${item.id}')`;
  const delFn=ids.length>1?`doDelAll(${idsJson})`:`doDelShop('${item.id}')`;
  return`<div class="sitem${item.done?" dk":""}">
    <button class="scb${item.done?" done":""}" onclick="${toggleFn}">
      ${item.done?`<svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`:""}
    </button>
    <div style="flex:1;min-width:0">
      <div class="sname">${esc(item.name)}</div>
      ${item.source?`<div class="ssrc">${esc(item.source)}</div>`:""}
    </div>
    ${item.qty?`<div class="sqty">${esc(item.qty)}</div>`:""}
    <button class="btn bic bd" onclick="${delFn}">✕</button>
  </div>`;
}
async function doToggle(id){const item=S.shopping.find(x=>x.id===id);if(!item)return;item.done=!item.done;render();await shopToggle(id,item.done);}
async function doToggleAll(ids){for(const id of ids){const it=S.shopping.find(x=>x.id===id);if(it)it.done=true;}render();for(const id of ids)await shopToggle(id,true);}
async function doDelShop(id){S.shopping=S.shopping.filter(x=>x.id!==id);render();await shopDel(id);}
async function doDelAll(ids){S.shopping=S.shopping.filter(x=>!ids.includes(x.id));render();for(const id of ids)await shopDel(id);}
async function doClearDone(){const ids=S.shopping.filter(i=>i.done).map(i=>i.id);S.shopping=S.shopping.filter(i=>!i.done);render();for(const id of ids)await shopDel(id);}
async function doAddShop(name,qty){
  if(!name.trim())return;
  const item={id:uid(),name:name.trim(),qty:(qty||"").trim(),done:false,source:"Manuell"};
  S.shopping.push(item);render();await shopAdd(item);
}
function jsSafe(s){return String(s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'")}
async function changeShopDishPortions(dishSource,delta){
  const items=S.shopping.filter(x=>x.dishSource===dishSource&&!x.done);
  if(!items.length)return;
  const cur=items[0].dishPortions||1;
  const newP=Math.max(0.25,Math.round((cur+delta)*4)/4);
  for(const item of items){
    item.dishPortions=newP;
    item.qty=scaleQty(item.baseQty,newP);
    item.source=item.source.replace(/\d+(?:\.\d+)?×/,newP+"×");
    await shopAdd(item);
  }
  render();
}
async function removeShopDish(dishSource){
  const ids=S.shopping.filter(x=>x.dishSource===dishSource).map(x=>x.id);
  S.shopping=S.shopping.filter(x=>x.dishSource!==dishSource);
  render();
  for(const id of ids)await shopDel(id);
}

function setLogIngQty(i, delta){
  const ig=S.logIngredients[i];
  if(!ig)return;
  const str=String(ig.qty||"").trim();
  // Extract number and unit
  const m=str.match(/^(\d[\d.,]*(?:\/\d+)?[½¼¾⅓⅔⅛⅜⅝⅞]?|[½¼¾⅓⅔⅛⅜⅝⅞])\s*(.*)/u);
  if(!m){return;}
  const num=parseNumStr(m[1]);
  if(num===null||num===0)return;
  const unit=m[2].trim();
  // Step: if num>=100 use 10g steps, if num>=10 use 5 steps, else 1
  const step=num>=100?10:num>=10?5:1;
  const newNum=Math.max(0,num+delta*step);
  ig.qty=unit?fmtNum(newNum)+" "+unit:fmtNum(newNum);
  S.logMacrosOverride=null;
  render();
}

function initLogIngredients(dish, portions){
  const p=parseFloat(portions)||1;
  S.logIngredients=(dish.ingredients||[]).map(ig=>({
    name:ig.name,
    qty:scaleQty(ig.qty,p),
    active:true
  }));
}

async function recalcMacros(){
  const activeIngs=S.logIngredients.filter(i=>i.active!==false);
  if(!activeIngs.length)return;
  S.logRecalcLoading=true;render();
  try{
    const ingList=activeIngs.map(i=>`${i.qty} ${i.name}`).join(", ");
    const dishName=S.logSel?.name||"";
    const sys=`Du bist Ernährungsexperte. Berechne die Nährwerte für diese Zutaten einer Mahlzeit. NUR JSON: {"kcal":0,"protein":0,"fat":0,"carbs":0,"fiber":0}. Ganze Zahlen für kcal, eine Dezimalstelle für den Rest.`;
    const data=await claude(sys,`Gericht: ${dishName}
Zutaten: ${ingList}`);
    if(data&&data.kcal!==undefined){
      S.logMacrosOverride={
        kcal:Math.round(data.kcal),
        protein:Math.round(data.protein*10)/10,
        fat:Math.round(data.fat*10)/10,
        carbs:Math.round(data.carbs*10)/10,
        fiber:Math.round((data.fiber||0)*10)/10
      };
    }
  }catch(e){toast("⚠️ "+e.message)}
  S.logRecalcLoading=false;render();
}

function submitLog(){
  let e=null;
  const f=S.logGram?parseFloat(S.logGram)/100:parseFloat(S.logPortions)||1;
  if((S.logMode==="dish"||S.logMode==="food"||S.logMode==="photo")&&S.logSel){
    const note=S.logGram?`${S.logGram}g`:(parseFloat(S.logPortions)!==1?`${S.logPortions}×`:"");
    const macros=S.logMacrosOverride||{kcal:Math.round((S.logSel.kcal||0)*f),protein:Math.round((S.logSel.protein||0)*f*10)/10,fat:Math.round((S.logSel.fat||0)*f*10)/10,carbs:Math.round((S.logSel.carbs||0)*f*10)/10,fiber:Math.round((S.logSel.fiber||0)*f*10)/10};
    const activeIngs=S.logIngredients.filter(i=>i.active!==false);
    const ingNote=activeIngs.length&&activeIngs.length<(S.logSel.ingredients||[]).length?` (${activeIngs.length}/${(S.logSel.ingredients||[]).length} Zutaten)`:"";
    e={id:uid(),name:S.logSel.name,...macros,portionNote:note+ingNote,date:S.logDate};
  }else if(S.logMode==="manual"&&S.logCustom.name){
    e={id:uid(),name:S.logCustom.name,kcal:parseFloat(S.logCustom.kcal)||0,protein:parseFloat(S.logCustom.protein)||0,fat:parseFloat(S.logCustom.fat)||0,carbs:parseFloat(S.logCustom.carbs)||0,fiber:parseFloat(S.logCustom.fiber)||0,portionNote:"",date:S.logDate};
  }
  if(!e)return;
  if(!S.diary[e.date])S.diary[e.date]=[];
  S.diary[e.date].push(e);saveLocal();closeModal();toast("✓ Geloggt");
}

        <div class="field"><label>Datum</label><input type="date" id="wdate" value="${today()}"/></div>

function doLogWeight(){

if(S.needSetup){render();}
else if(SESSION){loadAllData().then(()=>{startSSE();render();});}
else{render();}
</script>
