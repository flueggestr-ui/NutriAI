<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NutriKI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,500&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f0e8;--sf:#fff;--card:#faf7f1;
  --br:#e2d5c3;--br2:#c9b99f;
  --ink:#1a1005;--mu:#8a7a62;--fa:#c4b49a;
  --gr:#276749;--gl:#d5f0dd;--gd:#1e5038;
  --or:#b85418;--ol:#fde4d0;
  --bl:#1a4d7a;--bll:#d3e8f8;
  --go:#a07808;--gol:#fef7dc;
  --re:#b83418;
  --r:13px;--sh:0 2px 14px #1a100510;--shl:0 6px 30px #1a100518;
}
body{background:var(--bg);color:var(--ink);font-family:'Syne',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative}

/* NAV */
.nav{background:var(--sf);border-top:1px solid var(--br);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;z-index:200;box-shadow:0 -2px 20px #1a100512}
.nb{flex:1;padding:9px 2px 14px;background:none;border:none;color:var(--mu);cursor:pointer;font-family:'Syne',sans-serif;font-size:9px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px;letter-spacing:.05em;text-transform:uppercase;transition:color .2s;-webkit-tap-highlight-color:transparent}
.nb .ni{font-size:22px;line-height:1;transition:transform .2s}
.nb.on{color:var(--gr)}.nb.on .ni{transform:scale(1.1)}

/* PAGE */
.page{flex:1;padding:20px 16px 96px;animation:fu .25s ease}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.ptitle{font-family:'Playfair Display',serif;font-size:27px;font-weight:900;line-height:1.1;margin-bottom:3px}
.ptitle em{font-style:italic;color:var(--gr)}
.psub{color:var(--mu);font-size:12px;margin-bottom:18px;font-weight:500}
.slbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:8px}

/* CARD */
.card{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:15px;margin-bottom:11px;box-shadow:var(--sh)}

/* BUTTON */
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 16px;border-radius:9px;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.03em;transition:all .15s;-webkit-tap-highlight-color:transparent}
.bg{background:var(--gr);color:#fff}.bg:hover{background:var(--gd)}.bg:active{transform:scale(.97)}
.bo{background:transparent;border:1.5px solid var(--br2);color:var(--ink)}.bo:hover{border-color:var(--gr);color:var(--gr)}
.bgh{background:transparent;color:var(--mu)}.bgh:hover{color:var(--ink)}
.bd{background:transparent;border:1px solid #e8b4a0;color:var(--or)}.bd:hover{background:var(--ol)}
.bsm{padding:5px 11px;font-size:11px}
.bic{width:31px;height:31px;padding:0;justify-content:center;border-radius:8px;font-size:15px}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* FIELD */
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;background:var(--bg);border:1.5px solid var(--br);border-radius:8px;padding:9px 12px;color:var(--ink);font-family:'Syne',sans-serif;font-size:13px;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gr);background:var(--sf)}
.field textarea{resize:vertical;min-height:60px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.r4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:7px}

/* CHIPS */
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.chip{padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:600}
.ck{background:var(--gol);color:var(--go)}.cp{background:var(--bll);color:var(--bl)}
.cf{background:var(--ol);color:var(--or)}.cc{background:var(--gl);color:var(--gr)}

/* AI */
.aichat{background:var(--bg);border:1.5px solid var(--br);border-radius:var(--r);padding:13px;margin-bottom:11px;max-height:220px;overflow-y:auto;scroll-behavior:smooth}
.msg{margin-bottom:7px;display:flex}
.msg.u{justify-content:flex-end}
.bubble{padding:9px 13px;font-size:13px;line-height:1.5;max-width:86%;border-radius:12px}
.msg.a .bubble{background:var(--gl);color:var(--ink);border-radius:3px 12px 12px 12px}
.msg.u .bubble{background:var(--gr);color:#fff;border-radius:12px 3px 12px 12px}
.airow{display:flex;gap:7px;margin-bottom:12px}
.airow input{flex:1;background:var(--sf);border:1.5px solid var(--br);border-radius:8px;padding:9px 12px;font-family:'Syne',sans-serif;font-size:13px;outline:none}
.airow input:focus{border-color:var(--gr)}
.dots{display:flex;gap:4px;padding:6px 2px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;background:var(--gr);animation:pu 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pu{0%,80%,100%{transform:scale(.75);opacity:.4}40%{transform:scale(1);opacity:1}}
.sug{background:var(--card);border:1.5px solid var(--br);border-radius:var(--r);padding:13px;margin-bottom:9px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.sug:hover,.sug:active{border-color:var(--gr);box-shadow:var(--sh)}
.sug.sel{border-color:var(--gr);background:var(--gl)}
.sugname{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;margin-bottom:3px}
.sugdesc{font-size:12px;color:var(--mu);margin-bottom:5px}

/* SHOPPING - THE STAR */
.shopwrap{padding-bottom:4px}
.sitem{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--sf);border:1px solid var(--br);border-radius:var(--r);margin-bottom:8px;box-shadow:var(--sh);transition:all .3s}
.sitem.dk{background:var(--card);border-color:var(--br)}
.sitem.dk .sname{text-decoration:line-through;color:var(--fa)}
.sitem.dk .sqty{color:var(--fa)}
.scb{width:26px;height:26px;border-radius:8px;border:2px solid var(--br2);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .2s;-webkit-tap-highlight-color:transparent}
.scb.done{background:var(--gr);border-color:var(--gr);color:#fff}
.sname{flex:1;font-size:14px;font-weight:500;line-height:1.3}
.sqty{font-size:12px;color:var(--mu);font-weight:500;white-space:nowrap}
.ssrc{font-size:10px;color:var(--fa);margin-top:1px}
.live-badge{display:inline-flex;align-items:center;gap:5px;background:var(--gl);color:var(--gr);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--gr);animation:pu 1.5s infinite}
.live-badge.off{background:#fee;color:var(--re)}
.live-badge.off .live-dot{background:var(--re)}
.cat-label{display:flex;align-items:center;justify-content:space-between;margin:14px 0 7px}

/* PLAN */
.pslot{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:10px 13px;margin-bottom:5px;display:flex;align-items:center;gap:9px;transition:border-color .2s}
.pslot:hover{border-color:var(--gr)}
.plab{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--mu);min-width:68px}
.pdname{flex:1;font-size:12.5px;font-weight:500}
.pkcal{font-size:11px;color:var(--go);font-weight:700}
.genbanner{background:linear-gradient(135deg,var(--gl),var(--bll));border:1.5px solid var(--gr);border-radius:var(--r);padding:16px;margin-bottom:15px}

/* WEIGHT */
.wbig{font-family:'Playfair Display',serif;font-size:52px;font-weight:900;line-height:1}
.wchart{display:flex;align-items:flex-end;gap:3px;height:72px;margin-top:10px}
.wb{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:0}
.wbar{border-radius:3px 3px 0 0;min-height:3px;width:100%}
.wlbl{font-size:8px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}

/* PROGRESS BARS */
.pbar-wrap{margin-bottom:10px}
.pbar-row{margin-bottom:8px}
.pbar-top{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.pbar-label{font-weight:700;color:var(--mu)}
.pbar-val{font-weight:700}
.pbar-track{height:8px;background:var(--bg);border-radius:10px;overflow:hidden;border:1px solid var(--br)}
.pbar-fill{height:100%;border-radius:10px;transition:width .5s ease}
.pbar-fill.over{background:var(--or)!important}
/* USER SWITCHER */
.user-sw{display:flex;gap:0;background:var(--bg);border:1.5px solid var(--br);border-radius:10px;padding:3px;margin-bottom:16px}
.user-sw-btn{flex:1;padding:7px;border:none;border-radius:8px;cursor:pointer;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;transition:all .2s;background:transparent;color:var(--mu)}
.user-sw-btn.on{background:var(--gr);color:#fff;box-shadow:0 2px 8px #27674933}
.drow{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--bg)}

/* MODAL */
.ov{position:fixed;inset:0;background:#1a100552;backdrop-filter:blur(4px);z-index:300;display:flex;align-items:flex-end}
.modal{background:var(--sf);border-radius:22px 22px 0 0;border-top:2.5px solid var(--gr);padding:22px 18px 36px;width:100%;max-height:93vh;overflow-y:auto;animation:su .28s ease}
@keyframes su{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.mtitle{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;margin-bottom:14px}
.mact{display:flex;gap:9px;margin-top:16px}
.iedit{display:flex;gap:5px;margin-bottom:7px;align-items:center}
.iedit input{flex:1}.iqty{width:95px;flex-shrink:0}

/* SETUP */
.setup{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:40px 20px 30px;background:var(--bg)}
.setup-logo{font-family:'Playfair Display',serif;font-size:44px;font-weight:900;margin-bottom:6px;text-align:center}
.setup-logo em{font-style:italic;color:var(--gr)}
.step-box{background:var(--sf);border:1px solid var(--br);border-radius:14px;padding:16px;margin-bottom:12px}
.step-num{display:inline-flex;width:24px;height:24px;border-radius:50%;background:var(--gr);color:#fff;font-size:12px;font-weight:700;align-items:center;justify-content:center;margin-right:8px;flex-shrink:0}
.step-row{display:flex;align-items:flex-start;gap:0;margin-bottom:8px}
.step-row:last-child{margin-bottom:0}
code{background:var(--bg);border:1px solid var(--br);border-radius:5px;padding:2px 7px;font-size:12px;font-family:monospace;color:var(--gr)}

/* TOAST */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--gr);color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;font-weight:700;z-index:400;white-space:nowrap;box-shadow:0 4px 20px #27674944;animation:ti .3s ease}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* UTILS */
.badge{display:inline-block;background:var(--or);color:#fff;border-radius:10px;font-size:9px;padding:1px 6px;margin-left:3px;vertical-align:middle}
.div{height:1px;background:var(--br);margin:13px 0}
.empty{text-align:center;color:var(--mu);padding:40px 20px;font-size:13px;line-height:1.7}
.tag{display:inline-block;background:var(--bg);border:1px solid var(--br);border-radius:8px;padding:2px 8px;font-size:10px;color:var(--mu)}
select option{background:#fff}
a{color:var(--gr)}
</style>
</head>
<body>
<div id="root"></div>
<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════
// LOCAL STORAGE
// ═══════════════════════════════════════════════════════════════════
const LS = {
  get:(k)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};
const K={dishes:"nk3_dishes",diary:"nk3_diary",weight:"nk3_weight",plan:"nk3_plan",cfg:"nk3_cfg",goals:"nk3_goals",user:"nk3_user"};

// ═══════════════════════════════════════════════════════════════════
// FIREBASE REALTIME DATABASE (REST + SSE)
// ═══════════════════════════════════════════════════════════════════
let firebaseUrl = "";
let sseSource = null;

function fbUrl(path){ return `${firebaseUrl}/${path}.json`; }

async function fbGet(path){
  const r = await fetch(fbUrl(path));
  if(!r.ok) return null;
  return r.json();
}
async function fbSet(path, data){
  const r = await fetch(fbUrl(path),{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
  return r.ok;
}
async function fbPatch(path, data){
  const r = await fetch(fbUrl(path),{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
  return r.ok;
}
async function fbDelete(path){
  await fetch(fbUrl(path),{method:"DELETE"});
}

// SSE for real-time shopping updates
function startLiveSync(){
  if(sseSource){ sseSource.close(); sseSource=null; }
  if(!firebaseUrl) return;
  try{
    sseSource = new EventSource(fbUrl("shopping") + "?accept=text/event-stream");
    sseSource.addEventListener("put", e=>{
      try{
        const d=JSON.parse(e.data);
        // d.path is the changed path, d.data is new data
        if(d.path==="/" && d.data){
          // Full replace
          state.shopping = Object.entries(d.data).map(([id,item])=>({...item,id}));
        } else if(d.path!=="/" && d.data!==null){
          // Single item update
          const id=d.path.replace("/","");
          const idx=state.shopping.findIndex(x=>x.id===id);
          if(idx>=0) state.shopping[idx]={...d.data,id};
          else state.shopping.push({...d.data,id});
        } else if(d.path!=="/" && d.data===null){
          // Deletion
          const id=d.path.replace("/","");
          state.shopping=state.shopping.filter(x=>x.id!==id);
        } else if(d.path==="/" && d.data===null){
          state.shopping=[];
        }
        state.liveConnected=true;
        if(state.tab==="shopping"||state.setupDone) render();
      }catch{}
    });
    sseSource.addEventListener("keep-alive", ()=>{ state.liveConnected=true; });
    sseSource.onerror = ()=>{ state.liveConnected=false; if(state.tab==="shopping") render(); };
    sseSource.onopen = ()=>{ state.liveConnected=true; };
  }catch(e){ state.liveConnected=false; }
}

async function shopAdd(item){
  // item already has id
  await fbSet("shopping/"+item.id, {name:item.name,qty:item.qty||"",done:item.done,source:item.source||""});
}
async function shopToggle(id, done){
  await fbPatch("shopping/"+id, {done});
}
async function shopDelete(id){
  await fbDelete("shopping/"+id);
}
async function shopClearDone(){
  const toClear = state.shopping.filter(i=>i.done);
  for(const i of toClear) await fbDelete("shopping/"+i.id);
}
async function loadShoppingFromFb(){
  const data = await fbGet("shopping");
  if(data && typeof data==="object"){
    state.shopping = Object.entries(data).map(([id,item])=>({...item,id}));
  } else {
    state.shopping = [];
  }
}

// ═══════════════════════════════════════════════════════════════════
// CLAUDE API
// ═══════════════════════════════════════════════════════════════════
async function askClaude(system, user){
  const cfg = LS.get(K.cfg)||{};
  const key = cfg.apiKey||"";
  if(!key) throw new Error("Kein API-Key konfiguriert");
  const r = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-opus-4-5",max_tokens:2500,system,messages:[{role:"user",content:user}]})
  });
  if(!r.ok){ const e=await r.json(); throw new Error(e.error?.message||"API Fehler "+r.status); }
  const d=await r.json();
  const txt=d.content?.map(b=>b.text||"").join("")||"";
  try{ const clean=txt.split("```json").join("").split("```").join("").trim(); return JSON.parse(clean); }
  catch{ return null; }
}

// ═══════════════════════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════════════════════
const uid=()=>Math.random().toString(36).slice(2,9);
const today=()=>new Date().toISOString().slice(0,10);
const fmtD=d=>{try{return new Date(d+"T12:00:00").toLocaleDateString("de-DE",{weekday:"short",day:"2-digit",month:"short"})}catch{return d}};
const fmtShort=d=>{try{return new Date(d+"T12:00:00").toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"})}catch{return d}};
const DAYS=["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];
const MEALS=["Frühstück","Mittagessen","Abendessen","Snack"];

const cfg = LS.get(K.cfg)||{};
const DEFAULT_GOALS = {
  du:   {name:"Du",   ziel:"Muskelaufbau", kcal:3175, protein:178, carbs:365, fat:90},
  frau: {name:"Frau", ziel:"Abnehmen",     kcal:1525, protein:123, carbs:160, fat:55},
};
let state = {
  setupDone: !!(cfg.apiKey && cfg.firebaseUrl),
  tab:"ai",
  activeUser: LS.get(K.user)||"du",
  goals: LS.get(K.goals)||DEFAULT_GOALS,
  dishes: LS.get(K.dishes)||[],
  shopping: [],
  diary: LS.get(K.diary)||{},
  weight: LS.get(K.weight)||[],
  plan: LS.get(K.plan)||{},
  liveConnected: false,
  toast:null, _tt:null,
  // AI
  msgs:[{r:"a",t:"Hallo! 👋 Beschreib mir, was du essen möchtest – z.B. <em>proteinreiches Abendessen, schnell zubereitet</em> – und ich schlage dir 3 Gerichte mit genauen Nährwerten vor!"}],
  aiStep:"chat", sugs:[], selSug:null, editDish:null,
  aiLoading:false, refInput:"", refLoading:false,
  // modals
  modal:null, mdata:null,
  planLoading:false,
  dishPortions:{}, // {dishId: portions}
};

if(cfg.firebaseUrl){ firebaseUrl=cfg.firebaseUrl; }

function saveLocal(){
  LS.set(K.dishes,state.dishes);
  LS.set(K.diary,state.diary);
  LS.set(K.weight,state.weight);
  LS.set(K.plan,state.plan);
  LS.set(K.goals,state.goals);
  LS.set(K.user,state.activeUser);
}

function toast(msg){ if(state._tt)clearTimeout(state._tt); state.toast=msg; state._tt=setTimeout(()=>{state.toast=null;render();},2600); render(); }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function setTab(t){ state.tab=t; render(); }
function closeModal(){ state.modal=null; state.mdata=null; render(); }

// ═══════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════
function render(){
  const root=document.getElementById("root");
  root.innerHTML = state.setupDone ? renderApp() : renderSetup();
  bindAll();
  if(state.tab==="ai") scrollChat();
}

// ─── SETUP ────────────────────────────────────────────────────────
function renderSetup(){
  const saved=LS.get(K.cfg)||{};
  return `<div class="setup">
  <div class="setup-logo">Nutri<em>KI</em></div>
  <p style="color:var(--mu);font-size:12px;margin-bottom:24px;text-align:center">Dein KI-Ernährungsassistent</p>

  <div style="width:100%;max-width:420px">
    <div class="card" style="margin-bottom:16px">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px">🔑 Anthropic API-Key</div>
      <div class="field">
        <input id="s_api" type="password" placeholder="sk-ant-api03-..." value="${esc(saved.apiKey||"")}"/>
      </div>
      <div style="font-size:12px;color:var(--mu);line-height:1.6">
        Kostenlos erstellen auf <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a><br>
        → <em>API Keys</em> → <em>Create Key</em><br>
        <span style="font-size:11px">Wird nur lokal auf deinem Gerät gespeichert.</span>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div style="font-size:14px;font-weight:700;margin-bottom:4px">🔴 Live-Einkaufsliste (Firebase)</div>
      <div style="font-size:12px;color:var(--mu);line-height:1.6;margin-bottom:14px">
        Einmalig kostenlos einrichten – dann sehen du und deine Frau die Liste live:
      </div>

      <div class="step-box">
        <div class="step-row"><span class="step-num">1</span>

async function doSetup(){
  const api=document.getElementById("s_api")?.value.trim();
  const fb=document.getElementById("s_fb")?.value.trim().replace(/\/+$/,"");
  if(!api){ alert("Bitte API-Key eingeben"); return; }
  if(!fb){ alert("Bitte Firebase-URL eingeben"); return; }
  LS.set(K.cfg,{apiKey:api,firebaseUrl:fb});
  firebaseUrl=fb;
  state.setupDone=true;
  // test connection
  try{
    await fbSet("_init",{ok:true});
    await loadShoppingFromFb();
    startLiveSync();
    render();
  }catch(e){
    alert("Firebase-Verbindung fehlgeschlagen!\n\nPrüfe:\n• URL korrekt?\n• Testmodus aktiv?\n\nFehler: "+e.message);
  }
}

function addIng(){ if(!state.editDish.ingredients)state.editDish.ingredients=[]; state.editDish.ingredients.push({name:"",qty:""}); render(); }
function rmIng(i){ state.editDish.ingredients.splice(i,1); render(); }
function setED(k,v){ if(state.editDish) state.editDish[k]=v; }

async function sendAI(){
  const el=document.getElementById("aiIn");
  if(!el)return;
  const txt=el.value.trim();
  if(!txt||state.aiLoading)return;
  state.msgs.push({r:"u",t:esc(txt)});
  state.aiLoading=true; render(); scrollChat();
  try{
    const sys=`Du bist Ernährungsexperte und Koch-Assistent. Antworte IMMER als gültiges JSON-Array mit exakt 3 Gerichten.
Format: [{"name":"...","category":"Frühstück|Mittagessen|Abendessen|Snack","description":"2 Sätze Beschreibung","prepTime":"20 min","kcal":520,"protein":38,"fat":14,"carbs":52,"ingredients":[{"name":"Hähnchenbrust","qty":"200 g"},{"name":"Reis","qty":"80 g (roh)"}],"notes":"Kurzer Zubereitungstipp"}]
Nährwerte sind pro Portion, realistisch und präzise (Gramm-Angaben). NUR JSON, kein Text davor/danach.`;
    const data=await askClaude(sys,txt);
    if(data&&Array.isArray(data)&&data.length>0){
      state.sugs=data; state.selSug=null; state.editDish=null; state.aiStep="suggestions";
      state.msgs.push({r:"a",t:`Ich habe <strong>${data.length} Vorschläge</strong> für dich! Tippe auf einen, um ihn auszuwählen und anzupassen.`});
    } else {
      state.msgs.push({r:"a",t:"Leider konnte ich keine Vorschläge generieren. Bitte beschreibe dein Wunschgericht anders."});
    }
  }catch(e){ state.msgs.push({r:"a",t:"⚠️ Fehler: "+esc(e.message)}); }
  state.aiLoading=false; render(); scrollChat();
}

function scrollChat(){ setTimeout(()=>{ const c=document.getElementById("aichat"); if(c)c.scrollTop=c.scrollHeight; },60); }

function pickSug(i){ state.selSug=i; state.editDish={...state.sugs[i], ingredients:(state.sugs[i].ingredients||[]).map(x=>({...x}))}; render(); }

async function refineAI(){
  const el=document.getElementById("refIn");
  if(!el||state.refLoading||state.selSug===null)return;
  const ins=el.value.trim(); if(!ins)return;
  state.refLoading=true; render();
  try{
    const sys=`Du bist Ernährungsexperte. Modifiziere das Gericht gemäß der Anweisung. Antworte NUR als JSON-Objekt mit denselben Feldern. Passe Zutaten und Nährwerte realistisch an. Kein Text davor/danach.`;
    const data=await askClaude(sys,`Gericht: ${JSON.stringify(state.sugs[state.selSug])}\n\nAnweisung: ${ins}`);
    if(data&&data.name){ state.sugs[state.selSug]=data; state.editDish={...data,ingredients:(data.ingredients||[]).map(x=>({...x}))}; }
  }catch(e){}
  state.refLoading=false; render();
}

function saveFromAI(){
  if(!state.editDish)return;
  const d={...state.editDish,id:uid()};
  ["kcal","protein","fat","carbs"].forEach(k=>d[k]=parseFloat(d[k])||0);
  state.dishes.push(d); saveLocal(); toast(`✓ „${d.name}" gespeichert`); resetAI();
}

async function aiToShop(){
  if(!state.editDish)return;
  for(const ig of (state.editDish.ingredients||[])){
    if(ig.name){ const item={id:uid(),name:ig.name,qty:ig.qty||"",done:false,source:state.editDish.name}; state.shopping.push(item); await shopAdd(item); }
  }
  toast("✓ Zutaten zur Einkaufsliste hinzugefügt");
}

function resetAI(){ state.aiStep="chat"; state.sugs=[]; state.selSug=null; state.editDish=null; render(); }
function deleteDish(id){ state.dishes=state.dishes.filter(d=>d.id!==id); saveLocal(); toast("Gelöscht"); render(); }
function logDishQuick(id){ const d=state.dishes.find(x=>x.id===id); if(d){state.modal="diary";state.mdata={mode:"dish",selected:d,portions:"1",gram:"",date:today(),search:""};render();} }
async function dishToShopQuick(id){
  const d=state.dishes.find(x=>x.id===id); if(!d)return;
  for(const ig of (d.ingredients||[])){
    if(ig.name){ const item={id:uid(),name:ig.name,qty:ig.qty||"",done:false,source:d.name}; state.shopping.push(item); await shopAdd(item); }
  }
  toast(`✓ Zutaten von „${d.name}" hinzugefügt`);
}

function renderGerichte(){
  if(state.dishes.length===0) return`
    <div class="ptitle">Meine <em>Gerichte</em></div>
    <div class="psub">Gespeicherte Rezepte</div>
    <div class="empty">Noch keine Gerichte gespeichert.<br>Gehe zum ✨ KI-Assistenten und lass dir Gerichte vorschlagen!</div>`;

  const cards=state.dishes.map(d=>{
    const portions=state.dishPortions[d.id]||1;
    const f=portions;
    const kcal=Math.round((d.kcal||0)*f);
    const prot=Math.round((d.protein||0)*f*10)/10;
    const fat=Math.round((d.fat||0)*f*10)/10;
    const carbs=Math.round((d.carbs||0)*f*10)/10;
    const ings=(d.ingredients||[]).map(ig=>{
      const qtyNum=parseFloat(ig.qty);
      const qtyUnit=ig.qty?ig.qty.replace(/[\d.,]+/,"").trim():"";
      const scaledQty=qtyNum&&!isNaN(qtyNum)?(Math.round(qtyNum*f*10)/10)+" "+qtyUnit:ig.qty||"";
      return`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bg);font-size:12px">
        <span>${esc(ig.name)}</span>
        <span style="color:var(--mu);font-weight:600">${esc(scaledQty)}</span>
      </div>`;
    }).join("");

    return`<div class="card" style="margin-bottom:13px">
      <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px">
        <div style="flex:1">
          <div style="font-family:'Playfair Display',serif;font-size:17px;font-weight:700">${esc(d.name)}</div>
          ${d.category?`<span style="font-size:10px;background:var(--gl);color:var(--gr);border-radius:6px;padding:2px 8px;font-weight:700">${esc(d.category)}</span>`:""}
        </div>
        <button class="btn bic bd" onclick="deleteDish('${d.id}')">✕</button>
      </div>

      <!-- PORTION STEPPER -->
      <div style="display:flex;align-items:center;gap:12px;background:var(--bg);border-radius:10px;padding:8px 12px;margin-bottom:11px">
        <span style="font-size:11px;font-weight:700;color:var(--mu);letter-spacing:.05em">PORTIONEN</span>
        <div style="display:flex;align-items:center;gap:10px;margin-left:auto">
          <button class="btn bic bo" style="width:28px;height:28px;font-size:18px;line-height:1" onclick="changePortion('${d.id}',-0.5)">−</button>
          <span style="font-size:16px;font-weight:700;min-width:28px;text-align:center">${portions}</span>
          <button class="btn bic bo" style="width:28px;height:28px;font-size:18px;line-height:1" onclick="changePortion('${d.id}',0.5)">+</button>
        </div>
      </div>

      <!-- MACROS -->
      <div class="chips" style="margin-bottom:11px">
        <span class="chip ck">🔥 ${kcal} kcal</span>
        <span class="chip cp">💪 ${prot}g P</span>
        <span class="chip cf">🧈 ${fat}g F</span>
        <span class="chip cc">🌾 ${carbs}g KH</span>
      </div>

      <!-- INGREDIENTS -->
      ${ings?`<div style="margin-bottom:11px">
        <div class="slbl" style="margin-bottom:5px">Zutaten für ${portions} Portion${portions!==1?"en":""}</div>
        ${ings}
      </div>`:""}

      <!-- ACTIONS -->
      <div style="display:flex;gap:7px;flex-wrap:wrap">
        <button class="btn bg bsm" onclick="dishToShopFromGerichte('${d.id}')">🛒 Zur Einkaufsliste</button>
        <button class="btn bo bsm" onclick="openAddToPlanModal('${d.id}')">📅 Zum Wochenplan</button>
        <button class="btn bo bsm" onclick="logDishQuick('${d.id}')">📓 Loggen</button>
      </div>
    </div>`;
  }).join("");

  return`<div class="ptitle">Meine <em>Gerichte</em></div>
    <div class="psub">${state.dishes.length} Rezepte gespeichert</div>
    ${cards}`;
}

function changePortion(id, delta){
  const cur=state.dishPortions[id]||1;
  const next=Math.max(0.5, Math.round((cur+delta)*2)/2);
  state.dishPortions[id]=next;
  render();
}

async function dishToShopFromGerichte(id){
  const d=state.dishes.find(x=>x.id===id); if(!d)return;
  const portions=state.dishPortions[id]||1;
  let count=0;
  for(const ig of (d.ingredients||[])){
    if(!ig.name)continue;
    const qtyNum=parseFloat(ig.qty);
    const qtyUnit=ig.qty?ig.qty.replace(/[\d.,]+/,"").trim():"";
    const scaledQty=qtyNum&&!isNaN(qtyNum)?(Math.round(qtyNum*portions*10)/10)+" "+qtyUnit:ig.qty||"";
    const item={id:uid(),name:ig.name,qty:scaledQty,done:false,source:d.name+(portions!==1?" ("+portions+"×)":"")};
    state.shopping.push(item);
    await shopAdd(item);
    count++;
  }
  toast(`✓ ${count} Zutaten (${portions}×) zur Einkaufsliste`);
}

function openAddToPlanModal(dishId){
  state.modal="addtoplan";
  state.mdata={dishId};

}

  return`<div class="ov" onclick="if(event.target===this)closeModal()">

function addDishToPlan(dishId){
  const d=state.dishes.find(x=>x.id===dishId); if(!d)return;
  const day=document.getElementById("atp_day")?.value;
  const meal=document.getElementById("atp_meal")?.value;
  if(!day||!meal)return;
  if(!state.plan[day])state.plan[day]={};
  state.plan[day][meal]={
    name:d.name,
    kcal:d.kcal||0,
    protein:d.protein||0,
    fat:d.fat||0,
    carbs:d.carbs||0,
    ingredients:d.ingredients||[]
  };
  saveLocal();
  closeModal();
  toast(`✓ "${d.name}" am ${day} als ${meal} eingetragen`);
}

    </div>`;

  const dayKcal=day=>Object.values(state.plan[day]||{}).reduce((s,m)=>s+(m.kcal||0),0);
  const slots=hasPlan?DAYS.map(day=>{
    if(!state.plan[day])return"";
    const ms=MEALS.map(meal=>{
      const m=state.plan[day]?.[meal];
      return`<div class="pslot">

      </div>`;
    }).join("");
    return`<div style="margin-bottom:15px">
      <div style="font-family:'Playfair Display',serif;font-size:15px;font-weight:700;margin-bottom:7px;display:flex;align-items:center">
        ${day}<span style="font-size:11px;color:var(--go);font-weight:700;margin-left:auto">${dayKcal(day)} kcal</span>
      </div>${ms}</div>`;
  }).join("") : "";

  return`<div class="ptitle">Wochen-<em>plan</em></div>
    <div class="psub">KI-Ernährungsplan für 7 Tage</div>
    ${!hasPlan?`<div class="genbanner">
      <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:4px">Plan generieren</div>
      <p style="font-size:12px;color:var(--mu);margin-bottom:12px">Beschreibe deine Ziele – die KI erstellt einen vollständigen Wochenplan.</p>
      <button class="btn bg" onclick="openPlanModal()">✨ Wochenplan erstellen</button>
    </div>`:`
    <div style="display:flex;gap:7px;margin-bottom:15px;flex-wrap:wrap">
      <button class="btn bg bsm" onclick="planToShop()">🛒 Alle Zutaten → Einkauf</button>
      <button class="btn bo bsm" onclick="openPlanModal()">✨ Neu generieren</button>
      <button class="btn bd bsm" onclick="state.plan={};saveLocal();render()">🗑 Löschen</button>
    </div>`}
    ${slots}`;
}

function openPlanModal(){ state.modal="plan"; render(); }

async function generatePlan(prefs){
  state.modal=null; state.planLoading=true; render();
  try{
    const sys=`Du bist Ernährungsexperte. Erstelle einen vollständigen 7-Tage-Ernährungsplan.
Antworte NUR als JSON-Objekt – kein Text davor oder danach, keine Erklärungen.
Exaktes Format:
{"Montag":{"Frühstück":{"name":"...","kcal":400,"protein":20,"fat":10,"carbs":55,"ingredients":[{"name":"Haferflocken","qty":"80 g"},{"name":"Milch","qty":"200 ml"}]},"Mittagessen":{...},"Abendessen":{...},"Snack":{...}},"Dienstag":{...},"Mittwoch":{...},"Donnerstag":{...},"Freitag":{...},"Samstag":{...},"Sonntag":{...}}
Alle 7 Tage müssen enthalten sein. Nährwerte realistisch. Zutaten immer mit Mengenangabe.`;
    const saved=state.dishes.length>0?`Baue bevorzugt diese Lieblingsgerichte des Nutzers ein: ${state.dishes.map(d=>d.name).join(", ")}.`:"";
    const data=await askClaude(sys,`Erstelle Plan für: ${prefs}. ${saved}`);
    if(data&&data["Montag"]){ state.plan=data; saveLocal(); toast("✓ Wochenplan erstellt!"); }
    else { toast("⚠️ KI-Antwort fehlerhaft, bitte erneut versuchen."); }
  }catch(e){ toast("⚠️ "+e.message); }
  state.planLoading=false; render();
}

async function planToShop(){
  let count=0;
  for(const dayMeals of Object.values(state.plan)){
    for(const meal of Object.values(dayMeals)){
      for(const ing of (meal.ingredients||[])){
        if(ing.name){
          const item={id:uid(),name:ing.name,qty:ing.qty||"",done:false,source:"Wochenplan"};
          state.shopping.push(item);
          await shopAdd(item);
          count++;
        }
      }
    }
  }
  toast(`✓ ${count} Artikel zur Einkaufsliste`);
  setTab("shopping");
}

function renderShopping(){
  const undone=state.shopping.filter(i=>!i.done);
  const done=state.shopping.filter(i=>i.done);
  const liveHtml=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <div class="live-badge${state.liveConnected?"":" off"}">
      <div class="live-dot"></div>
      ${state.liveConnected?"Live synchronisiert":"Verbindung wird hergestellt…"}
    </div>
  </div>`;

  // Group undone by source
  const grp={};
  undone.forEach(i=>{ const s=i.source||"Manuell"; if(!grp[s])grp[s]=[]; grp[s].push(i); });

  const undoneSections=Object.entries(grp).map(([src,items])=>`
    <div class="slbl" style="margin-top:12px">${esc(src)}</div>
    ${items.map(item=>renderShopItem(item)).join("")}`).join("");

  const doneSection=done.length?`
    <div class="cat-label" style="margin-top:16px">
      <span class="slbl" style="margin-bottom:0">✓ Erledigt (${done.length})</span>
      <button class="btn bd bsm" onclick="doClearDone()">Alle löschen</button>
    </div>
    ${done.map(item=>renderShopItem(item)).join("")}`:"";

  return`<div class="ptitle">Einkaufs-<em>liste</em></div>
    <div class="psub">${undone.length} offen · ${done.length} erledigt</div>
    ${liveHtml}
    <div style="display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap">
      <button class="btn bg bsm" onclick="state.modal='addshop';render()">+ Artikel hinzufügen</button>
    </div>
    <div class="shopwrap">
      ${state.shopping.length===0?`<div class="empty">Einkaufsliste ist leer.<br>Füge Artikel hinzu oder generiere einen Wochenplan.</div>`:""}
      ${undoneSections}
      ${doneSection}
    </div>`;
}

function renderShopItem(item){
  return`<div class="sitem${item.done?" dk":""}" id="si_${item.id}">
    <button class="scb${item.done?" done":""}" onclick="doToggle('${item.id}')">
      ${item.done?`<svg width="13" height="11" viewBox="0 0 13 11" fill="none"><path d="M1.5 5.5L5 9L11.5 2" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`:""}
    </button>
    <div style="flex:1;min-width:0">
      <div class="sname">${esc(item.name)}</div>
      ${item.qty?`<div class="sqty">${esc(item.qty)}</div>`:""}
      ${item.source?`<div class="ssrc">${esc(item.source)}</div>`:""}
    </div>
    <button class="btn bic bd" onclick="doDelete('${item.id}')">✕</button>
  </div>`;
}

async function doToggle(id){
  const item=state.shopping.find(x=>x.id===id);
  if(!item)return;
  item.done=!item.done;
  render();
  await shopToggle(id, item.done);
}
async function doDelete(id){
  state.shopping=state.shopping.filter(x=>x.id!==id);
  render();
  await shopDelete(id);
}
async function doClearDone(){
  const done=state.shopping.filter(i=>i.done).map(i=>i.id);
  state.shopping=state.shopping.filter(i=>!i.done);
  render();
  for(const id of done) await shopDelete(id);
}
async function doAddShop(name,qty,source){
  if(!name.trim())return;
  const item={id:uid(),name:name.trim(),qty:qty.trim(),done:false,source:source||"Manuell"};
  state.shopping.push(item);
  render();
  await shopAdd(item);
}

function renderProgressBar(label, current, goal, color){
  const pct = Math.min(100, Math.round((current/goal)*100));
  const over = current > goal;
  return `<div class="pbar-row">
    <div class="pbar-top">
      <span class="pbar-label">${label}</span>
      <span class="pbar-val" style="color:${over?"var(--or)":color}">${current} / ${goal}${label==="Kalorien"?" kcal":" g"} <span style="font-weight:400;color:var(--mu)">(${pct}%)</span></span>
    </div>
    <div class="pbar-track">
      <div class="pbar-fill${over?" over":""}" style="width:${pct}%;background:${color}"></div>
    </div>
  </div>`;
}

function renderWeight(){
  const logs=state.weight;
  const latest=logs.length?logs[logs.length-1]:null;
  const l14=logs.slice(-14);
  const vals=l14.map(w=>w.kg);
  const mn=vals.length?Math.min(...vals)-1.5:60;
  const mx=vals.length?Math.max(...vals)+1.5:100;
  const rng=mx-mn||1;
  const diff=logs.length>=2?((latest.kg-logs[logs.length-2].kg).toFixed(1)):null;

  const chart=l14.length>=2?`<div class="card" style="margin-bottom:13px">
    <div class="slbl">Verlauf (letzte ${l14.length})</div>
    <div class="wchart">
      ${l14.map((w,i)=>{
        const h=Math.max(4,((w.kg-mn)/rng)*64);
        const isLast=i===l14.length-1;
        return`<div class="wb">
          <div style="font-size:8.5px;color:var(--gr);margin-bottom:2px;font-weight:700">${w.kg}</div>
          <div class="wbar" style="height:${h}px;background:${isLast?"var(--gr)":"var(--gl)"};border:1px solid var(--gr)"></div>
          <div class="wlbl">${fmtShort(w.date)}</div>
        </div>`;
      }).join("")}
    </div>
  </div>`:"";

  return`<div class="ptitle">Körper-<em>gewicht</em></div>
    <div class="psub">Fortschritt verfolgen</div>
    ${latest?`<div class="card" style="text-align:center;margin-bottom:13px">
      <div style="font-size:10px;color:var(--mu);letter-spacing:.08em;margin-bottom:7px">AKTUELL</div>
      <div class="wbig">${latest.kg}<span style="font-size:24px;font-weight:400"> kg</span></div>
      <div style="font-size:12px;color:var(--mu);margin-top:4px">${fmtD(latest.date)}</div>
      ${diff!==null?`<div style="font-size:15px;font-weight:700;margin-top:8px;color:${parseFloat(diff)<0?"var(--gr)":"var(--or)"}">${parseFloat(diff)>0?"+":""}${diff} kg</div>`:""}
    </div>`:""}
    ${chart}
    <div class="card">
      <div class="slbl">Neuer Eintrag</div>
      <div class="r2">
        <div class="field"><label>Gewicht (kg)</label><input type="number" id="wkg" placeholder="75.5" step=".1"/></div>
        <div class="field"><label>Datum</label><input type="date" id="wdate" value="${today()}"/></div>
      </div>
      <button class="btn bg" onclick="doLogWeight()">Speichern</button>
    </div>
    <div class="div"></div>
    ${logs.length>0?[...logs].reverse().map(w=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--br)">
        <span style="color:var(--mu);font-size:13px">${fmtD(w.date)}</span>
        <span style="font-family:'Playfair Display',serif;font-size:16px;font-weight:700">${w.kg} kg</span>
      </div>`).join(""):`<div class="empty">Noch kein Gewicht eingetragen.</div>`}`;
}

function doLogWeight(){
  const kg=parseFloat(document.getElementById("wkg")?.value);
  const date=document.getElementById("wdate")?.value||today();
  if(!kg){alert("Bitte Gewicht eingeben");return;}
  state.weight=state.weight.filter(w=>w.date!==date);
  state.weight.push({kg,date});
  state.weight.sort((a,b)=>a.date.localeCompare(b.date));
  saveLocal(); toast("✓ "+kg+" kg gespeichert"); render();
}

  const g=state.goals;
  const row=(who,label)=>`
    <div style="font-size:13px;font-weight:700;color:var(--gr);margin:14px 0 8px">👤 ${label}</div>
    <div class="r4">
      <div class="field"><label>kcal</label><input type="number" id="g_${who}_kcal" value="${g[who].kcal}"/></div>
      <div class="field"><label>Protein g</label><input type="number" id="g_${who}_protein" value="${g[who].protein}"/></div>
      <div class="field"><label>Carbs g</label><input type="number" id="g_${who}_carbs" value="${g[who].carbs}"/></div>
      <div class="field"><label>Fett g</label><input type="number" id="g_${who}_fat" value="${g[who].fat}"/></div>
    </div>`;
  return`<div class="ov" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="mtitle">Tagesziele</div>
      ${row("du", state.goals.du.name)}
      <div style="height:1px;background:var(--br);margin:4px 0"></div>
      ${row("frau", state.goals.frau.name)}
      <div class="mact">
        <button class="btn bg" style="flex:1" onclick="saveGoals()">Speichern</button>
        <button class="btn bo" onclick="closeModal()">Abbrechen</button>
      </div>
    </div>
  </div>`;
}

function saveGoals(){
  ["du","frau"].forEach(who=>{
    ["kcal","protein","carbs","fat"].forEach(k=>{
      const el=document.getElementById(`g_${who}_${k}`);
      if(el) state.goals[who][k]=parseInt(el.value)||0;
    });
  });
  saveLocal(); closeModal(); toast("✓ Ziele gespeichert");
}


function bindAll(){
  // allow enter on diary dish search to not submit form
  document.querySelectorAll("input[type=text],input:not([type])").forEach(el=>{
    el.addEventListener("keydown",e=>{ if(e.key==="Enter")e.preventDefault(); });
  });
}

// Init
if(state.setupDone){
  loadShoppingFromFb().then(()=>{ startLiveSync(); render(); });
} else {
  render();
}
</script>
</body>
</html>
